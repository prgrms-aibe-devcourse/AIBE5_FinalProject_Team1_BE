spring.application.name=codedock
spring.config.import=classpath:application-local.properties

# Database
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=oracle.jdbc.OracleDriver

# JPA
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.default_batch_fetch_size=100
# Oracle 11g에서 FETCH FIRST 문법이 생성되지 않도록 Legacy dialect 사용
spring.jpa.properties.hibernate.dialect=org.hibernate.community.dialect.OracleLegacyDialect
# Oracle 11g 호환 설정 (Hibernate 6 + Oracle 11g LOB null insert 문제 해결)
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true

# Flyway
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration
# 개발 DB에서 V10 적용 후 V9가 뒤늦게 추가된 경우가 있어 순서가 지난 마이그레이션도 허용함
spring.flyway.out-of-order=true

# Redis
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}

# Kafka
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
spring.kafka.consumer.group-id=codedock
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.apache.kafka.common.serialization.StringSerializer

# OAuth2
spring.security.oauth2.client.registration.github.client-id=${GITHUB_CLIENT_ID:local}
spring.security.oauth2.client.registration.github.client-secret=${GITHUB_CLIENT_SECRET:local}
spring.security.oauth2.client.registration.github.scope=read:user,user:email,repo

# JWT
jwt.secret=${JWT_SECRET:local-dev-secret-key-override-in-application-local}
jwt.access-token-expiry=3600000
jwt.refresh-token-expiry=604800000

# Server
server.port=8080

# Actuator
management.endpoints.web.exposure.include=health,info,prometheus
management.metrics.export.prometheus.enabled=true

# SpringDoc
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# Jackson
spring.jackson.time-zone=Asia/Seoul
spring.jackson.serialization.write-dates-as-timestamps=false

# OAuth2 redirect (FE 콜백 URL)
app.oauth2.redirect-uri=${OAUTH2_REDIRECT_URI:http://localhost:5173/oauth/callback}
app.oauth2.popup-redirect-uri=${OAUTH2_POPUP_REDIRECT_URI:http://localhost:5173/oauth/popup-callback}

# CORS / WebSocket origins
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:5174,http://localhost:3000,http://127.0.0.1:5173,http://127.0.0.1:5174,http://127.0.0.1:3000}
app.websocket.allowed-origin-patterns=${APP_WEBSOCKET_ALLOWED_ORIGIN_PATTERNS:${app.cors.allowed-origins}}

# Encoding
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true
server.servlet.encoding.force=true

# App
app.base-url=https://codedock.app

# Groq
groq.api-key=${GROQ_API_KEY:}
groq.model=${GROQ_MODEL:llama-3.3-70b-versatile}
