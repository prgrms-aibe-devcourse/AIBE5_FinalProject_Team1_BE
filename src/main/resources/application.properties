spring.application.name=codedock
spring.config.import=optional:classpath:application-local.properties

# Database
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=oracle.jdbc.OracleDriver

# JPA
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.default_batch_fetch_size=100
# Oracle 11g에서 FETCH FIRST 문법이 생성되지 않도록 Legacy dialect 사용
spring.jpa.properties.hibernate.dialect=org.hibernate.community.dialect.OracleLegacyDialect
# Oracle 11g 호환 설정 (Hibernate 6 + Oracle 11g LOB null insert 문제 해결)
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true

# Flyway
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration
# 개발 DB에서 V10 적용 후 V9가 뒤늦게 추가된 경우가 있어 순서가 지난 마이그레이션도 허용함
spring.flyway.out-of-order=true

# Redis
app.redis.enabled=${APP_REDIS_ENABLED:true}
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.username=${REDIS_USERNAME:}
spring.data.redis.password=${REDIS_PASSWORD:}
spring.data.redis.database=${REDIS_DATABASE:0}
spring.data.redis.timeout=${REDIS_TIMEOUT:2s}
spring.data.redis.connect-timeout=${REDIS_CONNECT_TIMEOUT:2s}
management.health.redis.enabled=${APP_REDIS_ENABLED:true}

# Kafka
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
spring.kafka.client-id=${KAFKA_CLIENT_ID:codedock-backend}
spring.kafka.consumer.group-id=${KAFKA_CONSUMER_GROUP_ID:codedock}
spring.kafka.consumer.auto-offset-reset=${KAFKA_CONSUMER_AUTO_OFFSET_RESET:earliest}
spring.kafka.consumer.enable-auto-commit=${KAFKA_CONSUMER_ENABLE_AUTO_COMMIT:false}
spring.kafka.consumer.key-deserializer=${KAFKA_CONSUMER_KEY_DESERIALIZER:org.apache.kafka.common.serialization.StringDeserializer}
spring.kafka.consumer.value-deserializer=${KAFKA_CONSUMER_VALUE_DESERIALIZER:org.apache.kafka.common.serialization.StringDeserializer}
spring.kafka.producer.key-serializer=${KAFKA_PRODUCER_KEY_SERIALIZER:org.apache.kafka.common.serialization.StringSerializer}
spring.kafka.producer.value-serializer=${KAFKA_PRODUCER_VALUE_SERIALIZER:org.apache.kafka.common.serialization.StringSerializer}
spring.kafka.producer.acks=${KAFKA_PRODUCER_ACKS:all}
spring.kafka.producer.retries=${KAFKA_PRODUCER_RETRIES:3}
spring.kafka.producer.properties.enable.idempotence=${KAFKA_PRODUCER_ENABLE_IDEMPOTENCE:true}
spring.kafka.producer.properties.max.in.flight.requests.per.connection=${KAFKA_PRODUCER_MAX_IN_FLIGHT_REQUESTS_PER_CONNECTION:5}
spring.kafka.listener.ack-mode=${KAFKA_LISTENER_ACK_MODE:record}
spring.kafka.listener.missing-topics-fatal=${KAFKA_LISTENER_MISSING_TOPICS_FATAL:false}

# OAuth2
spring.security.oauth2.client.registration.github.client-id=${GITHUB_CLIENT_ID:local}
spring.security.oauth2.client.registration.github.client-secret=${GITHUB_CLIENT_SECRET:local}
spring.security.oauth2.client.registration.github.scope=read:user,user:email,repo,read:project

# JWT
jwt.secret=${JWT_SECRET:local-dev-secret-key-override-in-application-local}
jwt.access-token-expiry=3600000
jwt.refresh-token-expiry=604800000

# Server
server.port=8080

# Actuator
management.endpoints.web.exposure.include=health,info,prometheus
management.prometheus.metrics.export.enabled=${MANAGEMENT_PROMETHEUS_ENABLED:true}

# SpringDoc
springdoc.api-docs.path=/api/v3/api-docs
springdoc.swagger-ui.path=/api/swagger-ui.html

# Jackson
spring.jackson.time-zone=Asia/Seoul
spring.jackson.serialization.write-dates-as-timestamps=false

# OAuth2 redirect (FE 콜백 URL)
app.oauth2.redirect-uri=${OAUTH2_REDIRECT_URI:http://localhost:5173/oauth/callback}
app.oauth2.popup-redirect-uri=${OAUTH2_POPUP_REDIRECT_URI:http://localhost:5173/oauth/popup-callback}

# CORS / WebSocket origins
app.cors.allowed-origin-patterns=${APP_CORS_ALLOWED_ORIGIN_PATTERNS:${APP_CORS_ALLOWED_ORIGINS:http://localhost:*,http://127.0.0.1:*,http://[::1]:*}}
app.websocket.allowed-origin-patterns=${APP_WEBSOCKET_ALLOWED_ORIGIN_PATTERNS:${app.cors.allowed-origin-patterns}}
app.local-network-origin-enabled=${APP_LOCAL_NETWORK_ORIGIN_ENABLED:false}

# Encoding
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true
server.servlet.encoding.force=true

# App
app.base-url=${APP_BASE_URL:https://codedock.app}

# Groq
groq.api-key=${GROQ_API_KEY:}
groq.model=${GROQ_MODEL:llama-3.3-70b-versatile}

# File upload (S3 presigned URL) — 채팅 이미지/파일 업로드
# AWS 자격증명은 표준 체인(env AWS_ACCESS_KEY_ID/AWS_SECRET_ACCESS_KEY)에서 읽음
app.upload.enabled=${UPLOAD_ENABLED:false}
app.upload.s3-bucket=${UPLOAD_S3_BUCKET:}
app.upload.region=${UPLOAD_REGION:${AWS_REGION:ap-northeast-2}}
app.upload.public-base-url=${UPLOAD_PUBLIC_BASE_URL:}
app.upload.key-prefix=${UPLOAD_KEY_PREFIX:uploads}
app.upload.max-bytes=${UPLOAD_MAX_BYTES:10485760}
