# Database (H2 in-memory)
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# Flyway
spring.flyway.enabled=false

# Redis / Kafka 비활성화
app.redis.enabled=false
management.health.redis.enabled=false
spring.autoconfigure.exclude=\
  org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration,\
  org.springframework.boot.autoconfigure.data.redis.RedisRepositoriesAutoConfiguration,\
  org.springframework.boot.autoconfigure.kafka.KafkaAutoConfiguration

# OAuth2 (테스트용 더미값)
spring.security.oauth2.client.registration.github.client-id=test-client-id
spring.security.oauth2.client.registration.github.client-secret=test-client-secret
spring.security.oauth2.client.registration.github.scope=read:user,user:email,repo

# JWT
jwt.secret=test-secret-key-must-be-at-least-32-characters-long
jwt.access-token-expiry=3600000
jwt.refresh-token-expiry=604800000

# OAuth2 redirect
app.oauth2.redirect-uri=http://localhost:5173/oauth/callback

# App
app.base-url=http://localhost:3000

# Gemini
gemini.api-key=test-api-key
gemini.model=gemini-2.0-flash
