global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets:
          - localhost:9090

  - job_name: codedock-backend
    metrics_path: /actuator/prometheus
    static_configs:
      - targets:
          - app:8080
        labels:
          service: codedock-backend

  - job_name: redis
    static_configs:
      - targets:
          - redis-exporter:9121
        labels:
          service: codedock-redis

  - job_name: kafka
    static_configs:
      - targets:
          - kafka-exporter:9308
        labels:
          service: codedock-kafka
